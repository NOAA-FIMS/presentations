# Why Bayesian Estimation in FIMS?

&lt;div class="bayes-grid"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Allows for probabilistic statements&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;E.g., the estimated probability that female spawning biomass at the start of 2024 is below the reference point of 40% of unfished biomass is 1.3%, and the probability that the relative fishing intensity exceeded 1 in 2023 is 0.4%. The joint probability of both these occurring is 0.2%.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Designed with MCMC in mind from the onset&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;MCMC sampling is a great diagnostic for models estimated using maximum likelihood and its capability has been included in FIMS since the beginning rather than starting the process after it is too late.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Bayesian sampling is now incredibly fast&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;{SparseNUTS} and other algorithms that can account for correlation and sparsity while sampling have made Bayesian estimation on non-linear models feasible on standard computers.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Same model, deeper inference&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;In FIMS, we do not rewrite the model; we sample the same TMB objective that powers frequentist estimation.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

---
# FIMS can be a TMB Model

&lt;div class="accent-box"&gt;
FIMS produces a TMB objective function under the hood. Once we have that objective, Bayesian sampling with {SparseNUTS} follows the same path used for any other TMB model.
&lt;/div&gt;

&lt;div class="bayes-grid"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Model definition&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;FIMS C++ classes build likelihood components and priors into one joint negative log posterior.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;TMB interface&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;The model is exposed as an objective with gradients from automatic differentiation.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Optimizer path&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Use nlminb for MLE and Hessian-based summaries.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Sampler path&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Use SparseNUTS::sample_snuts() on that same objective for posterior draws.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

---
# One Objective, Two Estimation Modes


``` r
# Build objective from FIMS/TMB ingredients
success &lt;- FIMS::CreateTMBModel()
parameters &lt;- list(p = get_fixed(), re = get_random())
obj &lt;- TMB::MakeADFun(
  data = list(),
  parameters,
  random = "re",
  DLL = "FIMS",
  silent = TRUE
)

# Frequentist path
fit &lt;- stats::nlminb(start = obj$par, objective = obj$fn, gradient = obj$gr)

# Bayesian path (same objective)
posterior &lt;- SparseNUTS::sample_snuts(
  obj = obj,
  iter_warmup = 1000,
  iter_sampling = 1000,
  chains = 4
)
```

&lt;div class="accent-box"&gt;
{SparseNUTS} samples the same AD-enabled target function. FIMS users get Bayesian inference without reimplementing the model in another framework.
&lt;/div&gt;

---
# SparseNUTS Workflow in Practice

&lt;div class="workflow-step"&gt;&lt;b&gt;Step 1:&lt;/b&gt; Configure the model in FIMS and confirm optimization converges.&lt;/div&gt;
&lt;div class="workflow-step"&gt;&lt;b&gt;Step 2:&lt;/b&gt; Pass the TMB objective to SparseNUTS with an informed warmup and chain count.&lt;/div&gt;
&lt;div class="workflow-step"&gt;&lt;b&gt;Step 3:&lt;/b&gt; Check diagnostics: R-hat, effective sample size, divergences, and trace plots.&lt;/div&gt;
&lt;div class="workflow-step"&gt;&lt;b&gt;Step 4:&lt;/b&gt; Summarize posterior distributions for management quantities and derived measures.&lt;/div&gt;

&lt;div class="accent-box"&gt;
SparseNUTS is especially attractive for TMB models with sparse random-effects structure, where efficient gradient-based MCMC is critical.
&lt;/div&gt;

# Priors Anywhere: Why FIMS C++ Design Helps

&lt;div class="bayes-grid"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Class-based parameter objects&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Parameters are represented as structured C++ objects with names, transforms, and links to model components.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Consistent objective assembly&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Priors enter the same joint objective as likelihood terms, minimizing bookkeeping and duplication.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Extensibility&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Adding a new parameter or model component naturally allows for allowing priors because all parameters use the same class.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;If a distribution exists you can use it&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Once a distribution is coded in FIMS it can be used to fit data or place a prior on a parameter. Other frameworks often restrict what types of priors are allowed on certain parameters. Multiple distributions can be used across time for a single parameter if desired and priors can be shared across parameters.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

---
# 🚧 Transformations: Flexibility vs. Safety

Decision Points:

&lt;div class ="bayes-column"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Safety First: Constrained Priors&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Users can only define Normal priors for parameters in log-space. This does not require a Jacobian. Models can easily transition from MLE output to MCMC input. This puts a hard limit on prior flexibility. &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Middle Ground: Natural Parameter Priors&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Allow users to put priors on natural parameters and pass min/max parameter constraints into {StanNUTS}, this will trigger Stan's automatic Jacobian detection. MLE models optimize better when parameters are in log-space, so moving between the two would be more challenging.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Maximum Flexibility: Automatic Jacobian Adjustments&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;This would keep input parameters in log or logit-space but users could place priors on any transformation. An automatic Jacobian transformation would determine any adjustment needed given the input and prior transformations. Models could swicth between MLE and MCMC, although there would be a flag needed to determine whether or not the Jacobian adjustment was turned on.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;


---
# Flexible Parameter Priors
&lt;br&gt;
&lt;div class="bayes-grid"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Parameter class field&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;The transformation field takes the the name of the transformation applied to the parameter.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Internal ApplyBackTransformation function&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Applies the appropriate back transformation given the transformation field.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Flexible prior specification&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Priors can be placed on the natural parameter or any transformation of it, such as the log or logit.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Challenges&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Given this flexibility, how do we make sure uses do not use the wrong transformation for MLE models.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;br&gt;&lt;br&gt;
🚧 Currently implemented in the surplus production development branch



---
# Automatic Jacobian Transformation
&lt;br&gt;
&lt;div class="bayes-column"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Tracking input parameter and prior transformations&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;A systems needs to be developed to distinguish between the input parameter's tranformation (what the MCMC sampler sees) and the transformation of the prior.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Internal AddLogJacobian function&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Given the transformations of the input and the prior from the transformation field, this internal function determines the log Jacobian adjustment using TMB's Jacobian() and log_determinant() functions.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Challenge&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;How to differentiate between MCMC and MLE estimation runs?&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;br&gt;
🚧 Currently being developed in the surplus production development branch


---
# Future for Multivariate priors
&lt;br&gt;
**Existing Infrastructure**
&lt;div class="bayes-column"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Shared Parameter Architecture&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Our C++ class structure allows us to easily extend simple distributions into complex, multivariate ones.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Cross-Module Linking&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Using a global pointer system, we can "bridge" parameters from different parts of the model to create a single, multivariate prior.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Location Independence&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Parameters can be linked and estimated together regardless of which module they originally belong to.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

---
# Future for Multivariate priors
&lt;br&gt;
**Next Steps for Development**
&lt;div class="bayes-column"&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Advanced Distributions&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Implement multivariate distributions like GMRF (Gaussian Markov Random Fields) and 2D-AR1 models.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Covariance Automation&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Develop functions to automatically assemble the covariance matrices required for these distributions.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="bayes-card"&gt;
    &lt;div class="bayes-title"&gt;Component Building&lt;/div&gt;
    &lt;div class="bayes-detail"&gt;Enhance the pointer system to allow users to build multivariate priors piece-by-piece from individual model components.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

---
# Summary 

- One TMB object for both MLE optimization and Bayesian MCMC 

- {SparseNUTS} package for fast, gradient-based MCMC in high-dimensional models

- Modular and flexible prior specification across all parameters

- Plan for flexible priors via automatic Jacobian transformations

- Future development on multivariate priors
