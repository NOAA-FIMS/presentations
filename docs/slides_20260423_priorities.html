# Requirements

* 287 defined requirements tracked in a Google Sheet
* Each requirement is scored for three metrics
  * Impact: The importance of this requirement to accuracy, desired features, or documented best practice in an ideal world. High impact/importance gets a value of 1.
  * Effort: The difficulty in implementing this requirement in any phase of the process, from initial software implementation, to data collection, to testing of this requirement, to interpretation of results. High effort gets a value of 2.
  * Compatibility: The importance of this requirement to backwards compatibility and comparability to existing tactical stock assessment management approaches. This should be measured as how necessary this feature is to accurately compare to a previous model. Importance for compatibility gets a value of 1.
* Requirements with smallest scores are worked on first
* Grouped into six topics

# New Statistical Methods

* Random effects for recruitment deviations
  * Results from the model-comparison project
  * Default behavior is now random recruitment deviations
* Dynamic Structural Equation Modeling (DSEM)
* Empirical Dynamic Modeling (e.g., brown shrimp, sardine)
* Multivariate priors

# Benevolent Dictator
## .hyperlink-style[[Listen to us does NOT mean do what we say](https://dev.to/jon_at_backboardio/stop-building-what-your-customers-ask-for-3d16?context=digest)] by Jonathan Murray

* Stakeholders see their slice. Not the whole system. Their fix is local.
* They imagine solutions inside the workflow they already have. Which is often the exact workflow you're trying to change.
* The thing that would actually solve the problem doesn't exist in their vocabulary yet. That's kind of your job.

# &amp;#x1F451; How the Benevolent Dictator Thinks

&lt;div class="dictator-wrap"&gt;
  &lt;div class="dictator-panel"&gt;
    &lt;div class="dictator-kicker"&gt;Decision filter&lt;/div&gt;
    &lt;ul&gt;
      &lt;li&gt;What was the customer trying to do when they felt the pain?&lt;/li&gt;
      &lt;li&gt;What's the actual friction, stripped of their proposed fix?&lt;/li&gt;
      &lt;li&gt;What would "solved" feel like, regardless of how it gets built?&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class="dictator-quote"&gt;
    &lt;div class="dictator-quote-main"&gt;"Heard" is not the same as "obeyed."&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class="dictator-quote"&gt;
    &lt;div class="dictator-quote-main"&gt;Founders who treat customer feedback as a spec instead of a bug report end up building slightly nicer versions of the thing that already isn't working.&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class="dictator-mantra"&gt;Listen obsessively!&lt;br&gt;
Obey selectively!&lt;br&gt;
And be willing to tell the room that the button they're asking for isn't the thing they actually need!&lt;/div&gt;
&lt;/div&gt;

  var i, text, code, codes = el.getElementsByTagName('code');
  for (i = 0; i < codes.length;) {
    code = codes[i];
    if (code.parentNode.tagName !== 'PRE' && code.childElementCount === 0) {
      text = code.textContent;
      if (/^\\\((.|\s)+\\\)$/.test(text) || /^\\\[(.|\s)+\\\]$/.test(text) ||
          /^\$\$(.|\s)+\$\$$/.test(text) ||
          /^\\begin\{([^}]+)\}(.|\s)+\\end\{[^}]+\}$/.test(text)) {
        code.outerHTML = code.innerHTML;  // remove <code></code>
        continue;
      }
    }
    i++;
  }
};
slideshow._releaseMath(document);
</script>
