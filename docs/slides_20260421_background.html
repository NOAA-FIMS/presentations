# .hyperlink-style[[Why was FIMS Created](https://noaa-fims.github.io/about/faq.html#why-is-fims-being-created)]
&lt;ul&gt; &lt;li&gt;New good practices in assessment methods, such as random effects, one-step ahead residuals, and new statistical distributions, can be difficult to add in a performant way to older software systems.&lt;/li&gt;&lt;br&gt;&lt;li&gt;FIMS will be written in a way that these new best practices are included at the onset rather than as an afterthought.&lt;/li&gt;&lt;br&gt; &lt;/ul&gt;

---
# .hyperlink-style[[Why was FIMS Created](https://noaa-fims.github.io/about/faq.html#why-is-fims-being-created)]

&lt;ul&gt; &lt;li&gt;FIMS was created, according to its Terms of Reference, to increase the pool of developers, designers, and testers that contribute to a commonly-used stock assessment modeling system that can be used across regions.&lt;/li&gt;&lt;br&gt;&lt;li&gt;The commitment to build FIMS was made by the National Marine Fisheries Service (NMFS) Science Board in 2020 partly in response to the Center for the Advancement of Population Assessment Methodology (CAPAM) workshop on Next Generation Models and the recommendations in Implementing a Next Generation Stock Assessment Enterprise, a NOAA Fisheries strategic document that calls for the development of general modeling platforms that facilitate ease of use, robust testing, modular applications, and best practices and to improve the professionalism of model development.&lt;/li&gt;&lt;br&gt; &lt;/ul&gt;

---
# .hyperlink-style[[Why was FIMS Created](https://noaa-fims.github.io/about/faq.html#why-is-fims-being-created)]

Implementing a Next Generation Stock Assessment Enterprise .hyperlink-style[[Lynch et al., 2018](https://spo.nmfs.noaa.gov/sites/default/files/TMSPO183.pdf)]

&lt;ul&gt;
&lt;li&gt;In 2001 NOAA Fisheries conducted 50 assessments&lt;/li&gt;
&lt;li&gt;In 2015 NOAA Fisheries conducted 190 assessments&lt;/li&gt;
&lt;li&gt;Next Generation Stock Assessments (NGSA) require three themes&lt;/li&gt;
  &lt;ul&gt;
  &lt;li&gt;holistic and ecosystem linked&lt;/li&gt;
  &lt;li&gt;use of innovative science for data collection and analysis&lt;/li&gt;
  &lt;li&gt;timely, efficient, and effective&lt;/li&gt;
  &lt;/ul&gt;
&lt;li&gt;Recommendations to improve NOAA Fisheries' ability to meet its mandates included the creation of general modeling platforms that facilitate&lt;/li&gt;
  &lt;ul&gt;
  &lt;li&gt;ease of use,&lt;/li&gt;
  &lt;li&gt;robust testing,&lt;/li&gt;
  &lt;li&gt;modular applications, and&lt;/li&gt;
  &lt;li&gt;best practices to improve the professionalism of model development&lt;/li&gt;
&lt;/ul&gt;

# .hyperlink-style[[Why Build FIMS Now](https://noaa-fims.github.io/about/faq.html#why-build-fims-now)]

&lt;ul&gt; &lt;li&gt;AD Model Builder (ADMB) is no longer being supported so the ability to compile existing models that use ADMB, e.g., Age Structured Assessment Program (ASAP), Assessment Model for Alaska (AMAK), Beaufort Assessment Model (BAM), and Stock Synthesis 3 (SS3), will be compromised with future operating system upgrades.&lt;/li&gt;&lt;br&gt;&lt;li&gt;Furthermore, development of these models that rely on ADMB to include best practices, such as random effects, is not feasible.&lt;/li&gt;&lt;br&gt; &lt;/ul&gt;

# Software in Fisheries
&lt;div&gt;
&lt;img src = "https://onlinelibrary.wiley.com/pb-assets/journal-banners/14672979-1501384690583.jpg"&gt;
&lt;/div&gt;

Dowling et al. (2026; .hyperlink-style[[10.1111/faf.70076](https://doi.org/10.1111/faf.70076)]) surveyed developers of 33 fishery stock assessment tools and found:

- &amp;#x2705; **91%** reported using formal version control.
- &amp;#x274c; **54%** did not actively promote their tools.
- &amp;#x274c; **36%** had a succession plan despite **61%** reporting training activity.
- &amp;#x1F627; **30%** felt their tool was trending towards being obsolete.
- &amp;#x1F627; **91%** of tools were generated a specific use case rather than from a general need.

These patterns support investing in shared infrastructure, explicit maintenance planning, and broader contributor participation.

# 🏛️ FIMS Architecture 🏛️

* Distributable R package that compiles during installation
* FIMS modules are written in C++
  * C++ is linked to R using Rcpp*&lt;sup&gt;1&lt;/sup&gt;*
  * Learn more in the .hyperlink-style[[training vignettes](https://noaa-fims.github.io/FIMS/articles/index.html)]
* .hyperlink-style[[Template Model Builder](https://kaskr.github.io/adcomp/Introduction.html)]*&lt;sup&gt;2&lt;/sup&gt;* currently serves as the engine for statistical inference
&lt;div style="text-align: center;"&gt;
  &lt;img src="static/fims_path_simple.png" style="width: 100%; max-width: 600px;" /&gt;
&lt;/div&gt;

.footnote[
[1] .hyperlink-style[[Rcpp:](https://cran.r-project.org/web/packages/Rcpp/index.html)] An R package that provides the seamless integration of R and C++.&lt;br&gt;
[2] .hyperlink-style[[Template Model Builder:](https://kaskr.github.io/adcomp/Introduction.html)] An R package for fitting statistical latent variable models to data.
]

# 🏛️ FIMS Architecture 🏛️

* Distributable R package that compiles during installation
* FIMS modules are written in `C++` in `inst/include`
