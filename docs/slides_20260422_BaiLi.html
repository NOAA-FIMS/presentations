# FIMS Design

&lt;img src="static/fims_path_simple.png" width="70%" height="80%" /&gt;

- A flexible suite of software tools to support sustainable fishery management
- FIMS modules are written in C++ and linked to R using Rcpp*&lt;sup&gt;1&lt;/sup&gt;*
- Template Model Builder*&lt;sup&gt;2&lt;/sup&gt;* serves as the engine for statistical inference in FIMS

.footnote[
[1] .hyperlink-style[[Rcpp:](https://cran.r-project.org/web/packages/Rcpp/index.html)] An R package that provides R functions as well as C++ classes which offer a seamless&lt;br&gt; integration of R and C++.&lt;br&gt;
[2] .hyperlink-style[[Template Model Builder:](https://kaskr.github.io/adcomp/Introduction.html)] An R package for fitting statistical latent variable models to data.
]

???
This R/C++ design shapes how we organize and automate testing.

# Why Testing Matters

.pull-left[
&lt;img src="static/Hook_and_Kelly_scientific_software_errors.png" width="80%" height="80%" /&gt;

(Hook and Kelly, 2009)
]

.pull-right[
- Scientific software output can accumulate many sources of error
- Testing ensures the code implementation matches the scientific theory
- Reproducibility guarantees consistent results across systems
- Comprehensive test suites allow for refactoring without unintentionally altering research outcomes
- Well-tested code builds trust and strengthens peer review
]

.footnote[
[1] .hyperlink-style[[Hook and Kelly, 2009:](https://se4science.org/workshops/secse09/Presentations/09_Hook.pdf)] Testing for (code) trustworthiness in scientific software.&lt;br&gt;
]

???
In science, a small typo in code can lead to a big error in a quota recommendation. Testing is our 'Peer Review' for code—ensuring our implementation actually matches our equations.

# Unit Testing: Testing Individual Components

- Test each scientific component **in isolation** before combining them 
- Ensures each mathematical piece behaves exactly as expected
- **Example:** If a logistic selectivity module has an inflection point of 10 and a slope of 0.2, verify that selectivity at age 10 equals 0.5 as expected from the logistic function

&lt;iframe src="https://noaa-fims.github.io/FIMS/testdown/test-rcpp-selectivity.html" width="100%" height="400px" data-external="1"&gt;&lt;/iframe&gt;

.footnote[
Figure source: .hyperlink-style[[FIMS selectivity Rcpp tests](https://noaa-fims.github.io/FIMS/testdown/test-rcpp-selectivity.html)]
]

???
- Testing frameworks and tools
  - Use **GoogleTest** to test C++ code
  - Use **testthat** to test R code
- Roles and responsibilities
  - Module developers write tests and execute them locally
  - GitHub Actions (GHA) automatically runs all tests before each Pull Request (PR) as a safeguard 
- Why this matters:
  - Prevents small mathematical errors from propagating into full model results
  
---
# Integration Testing: Testing Components Working Together

- Verify that different model components **interact correctly**
- Ensures information flows properly between components
- **Example:** Create a selectivity module, assign it to a fleet module, and verify that the fleet correctly stores and uses the associated selectivity IDs without errors

&lt;iframe src="https://noaa-fims.github.io/FIMS/testdown/test-rcpp-fleet-interface.html" width="100%" height="400px" data-external="1"&gt;&lt;/iframe&gt;

.footnote[
Figure source: .hyperlink-style[[FIMS selectivity Rcpp tests](https://noaa-fims.github.io/FIMS/testdown/test-rcpp-fleet-interface.html)]
]

???
- Testing frameworks and tools
  - Use **GoogleTest** to test C++ code
  - Use **testthat** to test R code
- Roles and responsibilities
  - Developers or testers write tests and execute them locally
  - GHA automatically runs all tests before each PR as a safeguard 
- Why this matters:
  - Even correct components can produce wrong results if they interact incorrectly

# Statistical Validation
- Statistical validation ensures the science is correct
- We use an operating model with known truth and compare FIMS estimates to that truth

&lt;style&gt;
.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-gap: 15px;
}

.metric-box {
  padding: 15px;
  border-radius: 10px;
  color: #003B5C;
  font-size: 0.9em;
}

.m1 { background-color: #E6F2FF; }
.m2 { background-color: #E6FFF2; }
.m3 { background-color: #FFF4E6; }
.m4 { background-color: #F3E6FF; }
&lt;/style&gt;

&lt;div class="metric-grid"&gt;

&lt;div class="metric-box m1"&gt;
&lt;b&gt;Metric 1: Magnitude Accuracy&lt;/b&gt;&lt;br&gt;
$$
\mathrm{median}\left(\left|\frac{\hat{y}-y}{y}\right|\right) \leq 0.2
$$
&lt;/div&gt;

&lt;div class="metric-box m2"&gt;
&lt;b&gt;Metric 2: Directional Bias&lt;/b&gt;&lt;br&gt;
$$
\left|\mathrm{mean}\left(\frac{\hat{y}-y}{y}\right)\right| \leq 0.1
$$
&lt;/div&gt;

&lt;div class="metric-box m3"&gt;
&lt;b&gt;Metric 3: Coefficient of Determination&lt;/b&gt;&lt;br&gt;
$$
\mathrm{cor}(\hat{y}, y)^2 \geq 0.9
$$
&lt;/div&gt;

&lt;div class="metric-box m4"&gt;
&lt;b&gt;Metric 4: Outlier Detection&lt;/b&gt;&lt;br&gt;
$$
\max\left(\left|\frac{\hat{y}-y}{\hat{\sigma}}\right|\right) \leq 4
$$
&lt;/div&gt;

&lt;/div&gt;

???
- metric 1: Validates the overall scale and magnitude of the outputs
- metric 2: Ensures the model does not systematically over- or under-estimate "true" values
- metric 3: Verifies that estimated trends move in tandem with expected trends
- metric 4: A deliberately lenient threshold to accommodate derived quantities across large matrices (n_years × n_ages)
Together, these provide complementary views of model performance

# Benchmarking FIMS Against Established Assessment Tools

- FIMS estimates are consistent with established models
- Software differences (ADMB vs TMB) have minimal impact on results when configured equivalently
- Small differences arise from implementation details (e.g., recruitment constraints)
- Random-effects models reduce bias compared to fixed-effects models

**These findings support the use of FIMS as a reliable and flexible framework for next-generation fisheries stock assessments while maintaining consistency with existing modeling approaches**

# Summary

.left-wide[
- We don’t just test code. We verify that our implementation stays true to the underlying biological and statistical theory.
- Multiple automated "safety nets" catch errors at every stage, from individual formulas to full-scale model runs.
- FIMS is benchmarked against established models to ensure consistent and reliable results.
- Every update is automatically tested, documented, and openly available for peer review, building a "glass box" you can trust.
